<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRACKMaintain — Login</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <h1>TRACKMaintain</h1>
      <p>Masaka Farms — Maintenance Management System</p>
    </div>

    <div id="error-msg" class="alert alert-danger" style="display:none;"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your.name@masakafarms.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;
            padding:11px;font-size:15px;margin-top:8px;" onclick="login()">
      Sign In
    </button>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:#9E9E9E;">
      SMARTMaintain v1.0 &nbsp;|&nbsp; Masaka Farms, Kigali Rwanda
    </p>

  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  // Redirect to dashboard if already logged in
  if (Auth.isLoggedIn()) {
    window.location.href = 'dashboard.html';
  }

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-msg');

    errorDiv.style.display = 'none';

    if (!email || !password) {
      errorDiv.textContent    = 'Please enter both email and password.';
      errorDiv.style.display  = 'flex';
      return;
    }

    const btn = document.querySelector('.btn-primary');
    btn.textContent = 'Signing in...';
    btn.disabled    = true;

    try {
      const res = await fetch('https://smartmaintain-api.onrender.com/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (data.success) {
        Auth.save(data.token, data.user);
        window.location.href = 'dashboard.html';
      } else {
        errorDiv.textContent   = data.message || 'Login failed. Please try again.';
        errorDiv.style.display = 'flex';
        btn.textContent        = 'Sign In';
        btn.disabled           = false;
      }
    } catch (err) {
      errorDiv.textContent   = 'Could not connect to server. Make sure the backend is running.';
      errorDiv.style.display = 'flex';
      btn.textContent        = 'Sign In';
      btn.disabled           = false;
    }
  }

  // Allow pressing Enter to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>
