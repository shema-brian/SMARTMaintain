<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRACKMaintain — Equipment</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <h2>TRACKMaintain</h2>
    <p>Masaka Farms, Kigali</p>
  </div>
  <nav class="sidebar-nav">
    <p class="nav-label">Main Menu</p>
    <a class="nav-item" href="dashboard.html">
      <span class="icon">&#9632;</span> Dashboard
    </a>
    <a class="nav-item active" href="equipment.html">
      <span class="icon">&#9881;</span> Equipment
    </a>
    <a class="nav-item" href="schedules.html">
      <span class="icon">&#128197;</span> Schedules
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">--</div>
      <div class="user-info">
        <p id="user-name">Loading...</p>
        <span id="user-role">--</span>
      </div>
    </div>
    <button class="logout-btn" onclick="Auth.logout()">Sign out</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>Equipment</h1>
    <div class="topbar-right">
      <button class="btn btn-primary" id="add-btn" onclick="openModal()" style="display:none;">
        + Add Equipment
      </button>
    </div>
  </div>

  <div class="page-content">
    <div class="table-card">
      <div class="table-header">
        <h3>All Equipment — Masaka Farms</h3>
        <span style="font-size:12px;color:#9E9E9E;" id="equip-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Equipment Name</th>
              <th>Model</th>
              <th>Location</th>
              <th>Responsible Person</th>
              <th>Status</th>
              <th>Purchase Date</th>
            </tr>
          </thead>
          <tbody id="equip-tbody">
            <tr><td colspan="7"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Equipment Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add New Equipment</h2>
    <div id="modal-error" class="alert alert-danger" style="display:none;"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Equipment Name</label>
        <input type="text" id="f-name" placeholder="e.g. Pasteurizer Unit 2">
      </div>
      <div class="form-group">
        <label>Model</label>
        <input type="text" id="f-model" placeholder="e.g. APV-HT300">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Serial Number</label>
        <input type="text" id="f-serial" placeholder="e.g. SN-PST-016">
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="f-location" placeholder="e.g. Processing Hall A">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Purchase Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Responsible Person</label>
        <select id="f-user"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any additional details about this equipment..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addEquipment()">Save Equipment</button>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/equipment.js"></script>
</body>
</html>
